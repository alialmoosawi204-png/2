<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<!-- تحديد أبعاد الشاشة ومنع التكبير بشكل صارم من خلال الميتا تاج -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Block Crush — Smart AI Edition</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<style>
  :root{
    --wood-dark:#5c3a21;
    --wood-mid:#7a4c28;
    --wood-light:#9c6b3e;
    --panel:#3e2a1a;
    --accent:#f4c542;
    --accent-dark:#c99a2e;
    --danger:#e74c3c;
  }
  *{box-sizing:border-box;}
  
  /* قفل الصفحة بالكامل لمنع السحب والتكبير والتحديد */
  html,body{
    margin:0; padding:0;
    width: 100%; height: 100%;
    position: fixed;
    overflow: hidden;
    overscroll-behavior-y: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    user-select: none;
    touch-action: none; 
    font-family:'Trebuchet MS','Segoe UI',Verdana,sans-serif;
    background:
      repeating-linear-gradient(90deg, var(--wood-mid) 0px, var(--wood-light) 6px, var(--wood-mid) 12px),
      var(--wood-dark);
    color:#fff3e0;
  }
  
  #app{
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px 10px 30px;
  }
  header{
    width:100%;
    max-width:640px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom:10px;
  }
  .stats-row {
    display: flex;
    flex-wrap: nowrap;
    justify-content: space-between;
    width: 100%;
    gap: 8px;
  }
  .stat-box {
    flex: 1;
    text-align: center;
    background:var(--panel);
    padding:6px 4px;
    border-radius:12px;
    border:2px solid var(--accent-dark);
    box-shadow:inset 0 2px 4px rgba(0,0,0,.4);
    font-size:clamp(11px,3vw,14px);
    font-weight: bold;
    color: #ffd700;
  }
  .stat-box span { display: block; font-size: 0.8em; color: #fff3e0; margin-bottom: 4px;}
  .clickable-stat { cursor: pointer; transition: all 0.2s; background: linear-gradient(180deg, var(--wood-mid), var(--panel)); }
  .clickable-stat:active { transform: translateY(2px); }

  #canvasWrap{
    width:100%;
    max-width:640px;
    background:linear-gradient(180deg,#4a2f1a,#3a2413);
    border:6px solid var(--wood-mid);
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.5), inset 0 0 20px rgba(0,0,0,.5);
    padding:6px;
    touch-action:none;
    position: relative;
  }
  canvas{
    display:block;
    width:100%;
    height:auto;
    border-radius:12px;
    background:#2f2015;
    touch-action:none;
  }
  .controls-group { width: 100%; max-width: 640px; margin-top: 15px; }
  .controls{ display:flex; gap:10px; flex-wrap:nowrap; justify-content:center; }
  
  button.woodBtn{
    flex: 1;
    font-family:inherit;
    font-size:15px;
    font-weight:bold;
    color:#fff3e0;
    background:linear-gradient(180deg,var(--wood-light),var(--wood-mid));
    border:2px solid var(--panel);
    border-radius:10px;
    padding:12px 10px;
    cursor:pointer;
    box-shadow:0 4px 0 var(--panel), 0 6px 10px rgba(0,0,0,.4);
    transition:all .1s ease;
    -webkit-tap-highlight-color: transparent; /* إخفاء وميض النقر على الهواتف */
  }
  button.woodBtn:active{
    transform:translateY(3px);
    box-shadow:0 1px 0 var(--panel), 0 2px 6px rgba(0,0,0,.4);
  }
  button.gold{
    background:linear-gradient(180deg,#ffe27a,var(--accent-dark));
    color:#3a2413; border-color:#7a5a1a; box-shadow:0 4px 0 #7a5a1a, 0 6px 10px rgba(0,0,0,.4);
  }
  button.gold:active{ box-shadow:0 1px 0 #7a5a1a, 0 2px 6px rgba(0,0,0,.4); }
  
  button.booster-active {
      background: linear-gradient(180deg, #ff7675, var(--danger));
      color: white;
      border-color: #c0392b;
      box-shadow: 0 4px 0 #c0392b, 0 0 15px rgba(231, 76, 60, 0.8);
      animation: pulse 1s infinite alternate;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

  .disabled {
      opacity: 0.5;
      cursor: not-allowed !important;
      pointer-events: none;
      filter: grayscale(100%);
  }

  .overlay{
    position:fixed; inset:0; background:rgba(20,12,6,.9);
    display:flex; align-items:center; justify-content:center;
    z-index:50; flex-direction: column; padding:20px;
    touch-action: pan-y; /* السماح بالسحب داخل النوافذ المنبثقة فقط */
  }
  .hidden { display: none !important; }
  .modalBox{
    background:linear-gradient(180deg,#7a4c28,#4a2f1a);
    border:4px solid var(--accent);
    border-radius:18px; padding:20px;
    text-align:center; max-width:100%; width: 450px;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
    animation:pop .35s ease;
    max-height: 90vh;
    overflow-y: auto;
    touch-action: pan-y;
  }
  @keyframes pop{
    0%{ transform:scale(.6); opacity:0; }
    70%{ transform:scale(1.06); opacity:1; }
    100%{ transform:scale(1); }
  }
  .modalBox h2{ margin:0 0 15px; color:var(--accent); font-size:24px; text-shadow:2px 2px 0 #2c1c10; }
  .menu-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 15px;}

  .setting-group { margin-bottom: 12px; text-align: right; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;}
  .setting-group label { display: block; margin-bottom: 5px; color: #ffd700; font-weight: bold; font-size:14px; }
  .setting-group select, .setting-group input { 
      width: 100%; padding: 8px; border-radius: 8px; background: #2a1c11; color: #fff; 
      border: 2px solid var(--accent-dark); font-family: inherit; font-size: 14px;
      outline: none;
  }
  
  .checkbox-group { display:flex; flex-wrap:wrap; gap:8px; }
  .checkbox-label { font-size:13px; color:#fff; display:flex; align-items:center; gap:5px; background:var(--panel); padding:4px 8px; border-radius:6px;}

  #storeGrid {
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
    max-height: 45vh; overflow-y: auto; padding: 10px;
    background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 20px;
    touch-action: pan-y;
  }
  #storeGrid::-webkit-scrollbar { width: 8px; }
  #storeGrid::-webkit-scrollbar-track { background: #3a2413; border-radius: 4px; }
  #storeGrid::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
</style>
</head>
<body>

<div id="mainMenu" class="overlay">
  <div class="modalBox">
    <h2>🧩 Block Crush</h2>
    <div class="menu-btns">
      <button class="woodBtn gold" id="btnModeLevels">🌟 وضع المستويات (<span id="savedLevelSpan">1</span>)</button>
      <button class="woodBtn" id="btnModeClassic">♾️ الوضع الكلاسيكي</button>
      <button class="woodBtn" id="btnSettings">⚙️ الإعدادات المتقدمة</button>
    </div>
  </div>
</div>

<div id="settingsModal" class="overlay hidden">
  <div class="modalBox">
    <h2>⚙️ الإعدادات المتقدمة</h2>
    
    <div class="setting-group">
      <label>🎨 النمط المرئي:</label>
      <select id="themeSelect">
        <option value="hearts">❤️🌸 قلوب وزهور</option>
        <option value="wood">🪵 خشبي</option>
        <option value="candy">🍬 حلوى</option>
        <option value="icecream">🍦 آيس كريم</option>
        <option value="emoji">🎉 إيموجي متنوع</option>
        <option value="animals">🐾 حيوانات</option>
        <option value="custom_emoji">✍️ إيموجي مخصص (اكتبه بالأسفل)</option>
        <option value="custom_image">🖼️ صورة مخصصة (ارفعها بالأسفل)</option>
      </select>
    </div>

    <div class="setting-group" id="customEmojiGroup">
      <label>✍️ اكتب الإيموجي المخصص الخاص بك:</label>
      <input type="text" id="customEmojiInput" placeholder="مثال: 🍎" maxlength="2">
    </div>
    <div class="setting-group" id="customImageGroup">
      <label>🖼️ ارفع صورة للبلوكات (من الاستوديو):</label>
      <input type="file" id="customImageInput" accept="image/*">
    </div>

    <div class="setting-group">
      <label>🎵 الأصوات:</label>
      <select id="soundSelect">
        <option value="classic">🎹 كلاسيكي</option>
        <option value="bubble">🫧 فقاعات المائية</option>
        <option value="marimba">🪵 خشبي / ماريمبا</option>
      </select>
    </div>

    <div class="setting-group">
      <label>📐 الأشكال المسموح ظهورها في اللعبة:</label>
      <div class="checkbox-group" id="shapeFilters">
        <label class="checkbox-label"><input type="checkbox" value="dot" checked> نقطة (1x1)</label>
        <label class="checkbox-label"><input type="checkbox" value="lines" checked> خطوط مستقيمة</label>
        <label class="checkbox-label"><input type="checkbox" value="squares" checked> مربعات</label>
        <label class="checkbox-label"><input type="checkbox" value="l_shapes" checked> حرف L</label>
        <label class="checkbox-label"><input type="checkbox" value="t_shapes" checked> حرف T</label>
        <label class="checkbox-label"><input type="checkbox" value="z_shapes" checked> حرف Z</label>
      </div>
    </div>

    <div class="setting-group">
      <label>☁️ الحفظ السحابي (Firebase):</label>
      <input type="text" id="fbUsername" placeholder="أدخل اسم المستخدم الخاص بك..." style="margin-bottom:8px;">
      <div style="display:flex; gap:5px;">
        <button class="woodBtn gold" id="btnCloudSave" style="padding:8px;">حفظ التقدم</button>
        <button class="woodBtn" id="btnCloudLoad" style="padding:8px;">استعادة</button>
      </div>
      <small id="cloudStatus" style="color:#2ecc71; display:block; margin-top:5px;"></small>
    </div>

    <div class="menu-btns">
      <button class="woodBtn" id="closeSettingsBtn">✔ حفظ التغييرات وإغلاق</button>
    </div>
  </div>
</div>

<div id="storeModal" class="overlay hidden">
  <div class="modalBox" style="width: 480px;">
    <h2>🛒 متجر البلوكات</h2>
    <p>التكلفة: 150 🪙<br><small style="color:#aaa;">سيتم استبدال قطعة فارغة بالجديدة.</small></p>
    <div id="storeGrid"></div>
    <div class="menu-btns">
      <button class="woodBtn" id="closeStoreBtn">❌ إلغاء وإغلاق</button>
    </div>
  </div>
</div>

<div id="gameOverModal" class="overlay hidden">
  <div class="modalBox">
    <h2 id="modalTitle">نهاية اللعبة</h2>
    <p id="modalText"></p>
    <div class="menu-btns">
      <button class="woodBtn gold" id="modalNextBtn" class="hidden">التالي ▶</button>
      <button class="woodBtn" id="modalReplayBtn">↺ العب مجدداً</button>
      <button class="woodBtn" id="modalMenuBtn">☰ القائمة الرئيسية</button>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="stats-row">
      <div class="stat-box" id="topScoreBox"><span>أعلى نقطة 🏆</span><div id="topScoreLabel">0 🪙</div></div>
      <div class="stat-box"><span>النقود 🪙</span><div id="scoreLabel">0 🪙</div></div>
      <div class="stat-box clickable-stat" id="topBuyBtn"><span>المتجر 🛒</span><div id="storeStatusLabel">150 🪙</div></div>
      <div class="stat-box clickable-stat" id="topMenuBtn"><span>القائمة ☰</span><div>الرئيسية</div></div>
    </div>
  </header>

  <div id="canvasWrap">
    <canvas id="game"></canvas>
  </div>

  <div class="controls-group">
    <div class="controls">
      <button class="woodBtn gold disabled" id="btnRotate">🔄 تدوير (30)</button>
      <button class="woodBtn gold disabled" id="btnBomb">💣 قنبلة (100)</button>
      <button class="woodBtn disabled" id="undoBtn">↩ تراجع (100)</button>
    </div>
  </div>
</div>

<script>
// ==========================================
// حماية الشاشة من الإيماءات (لكي تبدو اللعبة كتطبيق حقيقي)
// ==========================================

// منع السحب للأعلى والأسفل (تحديث الصفحة) إلا لو كان المستخدم يمرر داخل القوائم
document.addEventListener('touchmove', function (event) {
    if (!event.target.closest('.modalBox') && !event.target.closest('#storeGrid')) {
        event.preventDefault();
    }
}, { passive: false });

// منع التكبير بإصبعين (Pinch to zoom) في أنظمة iOS
document.addEventListener('gesturestart', function (event) {
    event.preventDefault();
});

// منع التكبير بالنقر المزدوج (Double-tap to zoom)
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
    let now = (new Date()).getTime();
    if (now - lastTouchEnd <= 300) {
        event.preventDefault();
    }
    lastTouchEnd = now;
}, { passive: false });

// ==========================================
// إعدادات Firebase 
// ==========================================
// ==========================================
// إعدادات Firebase وحفظ المستوى
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyDsXYQxVcpY36arvJjtDISud4wPoXoi-Ts",
  authDomain: "block-c988a.firebaseapp.com",
  projectId: "block-c988a",
  storageBucket: "block-c988a.firebasestorage.app",
  messagingSenderId: "546966143165",
  appId: "1:546966143165:web:2725fb2d20a5419e0db7d4",
  measurementId: "G-BQX1CZVS9R"
};  

// تهيئة قاعدة البيانات سحابياً
let db;
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
} catch (e) {
    console.error("خطأ في الاتصال بـ Firebase:", e);
}

// ربط أزرار الحفظ والاستعادة بالوظائف البرمجية
const btnCloudSave = document.getElementById('btnCloudSave');
const btnCloudLoad = document.getElementById('btnCloudLoad');
const fbUsername = document.getElementById('fbUsername');
const cloudStatus = document.getElementById('cloudStatus');

// زر حفظ التقدم (المستوى، أعلى نقاط، والنقاط الحالية)
btnCloudSave.addEventListener('click', () => {
    if(!db) { cloudStatus.textContent = "عذراً، قاعدة البيانات غير متصلة."; return; }
    const user = fbUsername.value.trim();
    if(!user) { cloudStatus.textContent = "يرجى كتابة اسم المستخدم أولاً."; return; }
    
    // حفظ البيانات داخل مسار خاص بالمستخدم في قاعدة البيانات
    db.ref('users/' + user).set({
        level: currentLevel, 
        topScore: topScore, 
        score: score
    }).then(() => {
        cloudStatus.style.color = "#2ecc71";
        cloudStatus.textContent = "تم حفظ التقدم بنجاح! ☁️"; 
        setTimeout(() => cloudStatus.textContent = "", 3000);
    }).catch(err => {
        cloudStatus.style.color = "#e74c3c";
        cloudStatus.textContent = "فشل حفظ التقدم، تحقق من الاتصال.";
    });
});

// زر استعادة التقدم باستخدام اسم المستخدم وكلمة المرور/الاسم
btnCloudLoad.addEventListener('click', () => {
    if(!db) { cloudStatus.textContent = "عذراً، قاعدة البيانات غير متصلة."; return; }
    const user = fbUsername.value.trim();
    if(!user) { cloudStatus.textContent = "يرجى كتابة اسم المستخدم لاستعادة الحساب."; return; }
    
    db.ref('users/' + user).once('value').then((snapshot) => {
        const data = snapshot.val();
        if(data) {
            currentLevel = data.level || 1; 
            topScore = data.topScore || 0; 
            score = data.score || 0;
            
            // تحديث التخزين المحلي (LocalStorage) وتحديث الواجهة
            localStorage.setItem('blockCrushLevel', currentLevel); 
            localStorage.setItem('blockCrushTopScore', topScore);
            savedLevelSpan.textContent = currentLevel;
            updateScoreDisplay(); 
            
            cloudStatus.style.color = "#2ecc71";
            cloudStatus.textContent = "تم استرجاع الحساب ومستوى اللعبة بنجاح! ✅"; 
            setTimeout(() => cloudStatus.textContent = "", 3000);
        } else {
            cloudStatus.style.color = "#e74c3c";
            cloudStatus.textContent = "لا توجد بيانات محفوظة لهذا الاسم.";
        }
    }).catch(err => {
        cloudStatus.style.color = "#e74c3c";
        cloudStatus.textContent = "حدث خطأ أثناء جلب البيانات.";
    });
});

(function(){
  "use strict";

  let currentTheme = localStorage.getItem('blockCrushTheme') || 'hearts';
  let currentSound = localStorage.getItem('blockCrushSound') || 'classic';
  let customEmojiChar = localStorage.getItem('blockCrushCustomEmoji') || '🍎';
  let customImageData = localStorage.getItem('blockCrushCustomImgData') || null;
  let activeShapeFilters = JSON.parse(localStorage.getItem('blockCrushShapeFilters')) || ['dot','lines','squares','l_shapes','t_shapes','z_shapes'];

  const themeSelect = document.getElementById('themeSelect');
  const soundSelect = document.getElementById('soundSelect');
  const customEmojiInput = document.getElementById('customEmojiInput');
  const customImageInput = document.getElementById('customImageInput');
  
  themeSelect.value = currentTheme;
  soundSelect.value = currentSound;
  customEmojiInput.value = customEmojiChar;

  document.querySelectorAll('#shapeFilters input').forEach(checkbox => {
      checkbox.checked = activeShapeFilters.includes(checkbox.value);
      checkbox.addEventListener('change', updateShapeFilters);
  });

  function updateShapeFilters() {
      activeShapeFilters = Array.from(document.querySelectorAll('#shapeFilters input:checked')).map(cb => cb.value);
      if(activeShapeFilters.length === 0) {
          activeShapeFilters = ['dot'];
          document.querySelector('#shapeFilters input[value="dot"]').checked = true;
      }
      localStorage.setItem('blockCrushShapeFilters', JSON.stringify(activeShapeFilters));
  }

  let customImageObj = new Image();
  if (customImageData) customImageObj.src = customImageData;

  customImageInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
          const reader = new FileReader();
          reader.onload = function(event) {
              customImageData = event.target.result;
              customImageObj.src = customImageData;
              localStorage.setItem('blockCrushCustomImgData', customImageData);
              themeSelect.value = 'custom_image';
              currentTheme = 'custom_image';
              localStorage.setItem('blockCrushTheme', currentTheme);
          };
          reader.readAsDataURL(file);
      }
  });

  customEmojiInput.addEventListener('input', e => {
      customEmojiChar = e.target.value;
      localStorage.setItem('blockCrushCustomEmoji', customEmojiChar);
  });

  themeSelect.addEventListener('change', e => {
      currentTheme = e.target.value;
      localStorage.setItem('blockCrushTheme', currentTheme);
  });
  
  soundSelect.addEventListener('change', e => {
      currentSound = e.target.value;
      localStorage.setItem('blockCrushSound', currentSound);
  });

  const btnCloudSave = document.getElementById('btnCloudSave');
  const btnCloudLoad = document.getElementById('btnCloudLoad');
  const fbUsername = document.getElementById('fbUsername');
  const cloudStatus = document.getElementById('cloudStatus');

  btnCloudSave.addEventListener('click', () => {
      if(!db) { cloudStatus.textContent = "يرجى إضافة إعدادات Firebase في الكود."; return; }
      const user = fbUsername.value.trim();
      if(!user) { cloudStatus.textContent = "أدخل اسم المستخدم أولاً."; return; }
      
      db.ref('users/' + user).set({
          level: currentLevel, topScore: topScore, score: score
      }).then(() => {
          cloudStatus.textContent = "تم الحفظ بنجاح! ☁️"; setTimeout(()=> cloudStatus.textContent = "", 3000);
      }).catch(err => cloudStatus.textContent = "خطأ في الحفظ!");
  });

  btnCloudLoad.addEventListener('click', () => {
      if(!db) { cloudStatus.textContent = "يرجى إضافة إعدادات Firebase في الكود."; return; }
      const user = fbUsername.value.trim();
      if(!user) { cloudStatus.textContent = "أدخل اسم المستخدم أولاً."; return; }
      
      db.ref('users/' + user).once('value').then((snapshot) => {
          const data = snapshot.val();
          if(data) {
              currentLevel = data.level || 1; topScore = data.topScore || 0; score = data.score || 0;
              localStorage.setItem('blockCrushLevel', currentLevel); localStorage.setItem('blockCrushTopScore', topScore);
              updateScoreDisplay(); cloudStatus.textContent = "تم استرجاع التقدم! ✅"; setTimeout(()=> cloudStatus.textContent = "", 3000);
          } else {
              cloudStatus.textContent = "لا يوجد بيانات لهذا المستخدم.";
          }
      });
  });

  let audioCtx;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, type, duration, vol=0.1, slideFreq = null) {
    if(!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if(slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  }

  function playSound(type) {
    initAudio();
    if(currentSound === 'classic') {
        if(type === 'drag') { playTone(300, 'sine', 0.1, 0.2); setTimeout(()=>playTone(450, 'sine', 0.1, 0.2), 50); }
        else if (type === 'place') playTone(150, 'square', 0.1, 0.3);

  function getOccupiedCount() {
      let count = 0;
      for (let r=0; r<gridRows; r++) for (let c=0; c<gridCols; c++) if (occupied[r][c] !== null) count++;
      return count;

  function canFit(templateIdx) {
      let t = SHAPE_TEMPLATES[templateIdx];
      let tempPiece = { shape: t.shape, rows: t.shape.length, cols: t.shape[0].length };
      for (let r = 0; r < gridRows; r++) {
          for (let c = 0; c < gridCols; c++) {
              if (isValidPlacement(tempPiece, r, c)) return true;
          }
      }
      return false;
  }

  function simulatesLineClear(templateIdx) {
      let t = SHAPE_TEMPLATES[templateIdx];
      let tempPiece = { shape: t.shape, rows: t.shape.length, cols: t.shape[0].length };
      
      for (let r = 0; r < gridRows; r++) {
          for (let c = 0; c < gridCols; c++) {
              if (isValidPlacement(tempPiece, r, c)) {
                  for (let i = 0; i < tempPiece.rows; i++) {
                      let rowFull = true;
                      for (let j = 0; j < gridCols; j++) {
                          let isPiece = (j >= c && j < c + tempPiece.cols && tempPiece.shape[i][j-c] === 1);
                          if (!isPiece && !occupied[r+i][j]) { rowFull = false; break; }
                      }
                      if (rowFull) return true;
                  }
                  for (let j = 0; j < tempPiece.cols; j++) {
                      let colFull = true;
                      for (let i = 0; i < gridRows; i++) {
                          let isPiece = (i >= r && i < r + tempPiece.rows && tempPiece.shape[i-r][j] === 1);
                          if (!isPiece && !occupied[i][c+j]) { colFull = false; break; }
                      }
                      if (colFull) return true;
                  }
              }
          }
      }
      return false;
  }

  function generateTrayPieces() {
      pieces = [];
      let candidates = [];
      let occupancy = getOccupiedCount() / (gridRows * gridCols);

      for (let i = 0; i < SHAPE_TEMPLATES.length; i++) {
          if(!activeShapeFilters.includes(SHAPE_TEMPLATES[i].cat)) continue;
          
          let fits = canFit(i);
          let score = 0;
          let pieceBlocks = SHAPE_TEMPLATES[i].shape.flat().filter(x => x === 1).length;

          if (fits) {
              score += 10; 
              if (simulatesLineClear(i)) score += 60; 
              if (occupancy > 0.65) {
                  if (pieceBlocks <= 3) score += 30; 
                  if (pieceBlocks >= 5) score -= 8;  
              }
          } else {
              score = 1; 
          }
          candidates.push({ idx: i, score: Math.max(1, score) });
      }

      if(candidates.length === 0) candidates.push({ idx: 0, score: 10 });

      let trayIndices = [];
      for (let k = 0; k < 3; k++) {
          let totalScore = candidates.reduce((sum, c) => sum + c.score, 0);
          let roll = Math.random() * totalScore;
          let current = 0;
          for (let c of candidates) {
              current += c.score;
              if (roll <= current) { trayIndices.push(c.idx); break; }
          }
      }

      if (!trayIndices.some(idx => canFit(idx))) {
          let fittingCandidates = candidates.filter(c => canFit(c.idx));
          if (fittingCandidates.length > 0) {
              fittingCandidates.sort((a, b) => b.score - a.score);
              trayIndices[0] = fittingCandidates[0].idx;
          } else {
              trayIndices[0] = 0; 
          }
      }

      for(let i=0; i<3; i++) {
          let idx = trayIndices[i];
          let t = SHAPE_TEMPLATES[idx];
          pieces.push({
              id: nextPieceId++, shape: t.shape, rows: t.shape.length, cols: t.shape[0].length,
              color: t.color, templateIndex: idx, placed: false, x: 0, y: 0, trayX: 0, trayY: 0, animSize: 0
          });
      }
      layoutTrayPositions(); checkGameOver();
  }

  function computeLayout(){
    const padding = 15;
    let availWidth = logicalWidth - padding*2;
    cellSize = Math.min((availWidth / gridCols), 50); 
    trayCellSize = cellSize * 0.65; 
    gridOriginX = (logicalWidth - (cellSize * gridCols))/2;
    gridOriginY = padding + 10;
    trayTop = gridOriginY + (cellSize * gridRows) + 40;
    logicalHeight = trayTop + (trayCellSize * 5) + 40;
    layoutTrayPositions();
  }

  function layoutTrayPositions(){
    const gap = 20;
    const unplacedPieces = pieces.filter(p => !p.placed);
    const totalWidth = unplacedPieces.reduce((sum,p)=> sum + p.cols*trayCellSize, 0) + gap*(unplacedPieces.length-1);
    let startX = (logicalWidth - totalWidth)/2;
    unplacedPieces.forEach(p => {
      p.trayX = startX; p.trayY = trayTop + (4 * trayCellSize - (p.rows * trayCellSize)) / 2;
      if (dragPiece !== p && !animating.has(p.id)){ p.x = p.trayX; p.y = p.trayY; }
      startX += (p.cols * trayCellSize) + gap;
    });
  }

  function resizeCanvas(){
    const dpr = window.devicePixelRatio || 1;
    logicalWidth = Math.min(canvasWrap.clientWidth, 640); if (logicalWidth < 280) logicalWidth = 280;
    computeLayout();
    canvas.width = Math.round(logicalWidth*dpr); canvas.height = Math.round(logicalHeight*dpr);
    canvas.style.width = logicalWidth+"px"; canvas.style.height = logicalHeight+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resizeCanvas);

  function roundRect(x,y,w,h,r){
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  function drawBlockCell(px, py, size, color, alpha = 1, icon = ""){
    const pad = 1.5; ctx.save(); ctx.globalAlpha = alpha;
    
    if(currentTheme === 'custom_image' && customImageData) {
        ctx.beginPath(); roundRect(px+pad, py+pad, size-pad*2, size-pad*2, size*0.16); ctx.closePath(); ctx.clip();
        try { ctx.drawImage(customImageObj, px+pad, py+pad, size-pad*2, size-pad*2); } catch(e){}
        ctx.lineWidth = 1; ctx.strokeStyle = "#00000033"; ctx.stroke(); ctx.restore(); return;
    }

    if (currentTheme === 'candy') {
        roundRect(px+pad, py+pad, size-pad*2, size-pad*2, size*0.4); ctx.fillStyle = color; ctx.fill();
        ctx.globalAlpha = alpha * 0.6; roundRect(px+pad*2, py+pad*2, size-pad*4, (size-pad*4)*0.4, size*0.3); ctx.fillStyle = "#fff"; ctx.fill();
    } else if (currentTheme === 'icecream') {
        roundRect(px+pad, py+pad, size-pad*2, size-pad*2, size*0.2); ctx.fillStyle = color; ctx.fill();
        ctx.globalAlpha = 0.5; ctx.fillStyle = "#fff"; ctx.fill(); 
        ctx.globalAlpha = alpha; ctx.font = `${size*0.5}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText("🍦", px+size/2, py+size/2);
    } else {
        roundRect(px+pad, py+pad, size-pad*2, size-pad*2, size*0.16);
        const grad = ctx.createLinearGradient(px,py,px,py+size);
        grad.addColorStop(0, color); grad.addColorStop(1, "#00000055");
        ctx.fillStyle = color; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = "#00000033"; ctx.stroke();
        ctx.globalAlpha = alpha*0.35; roundRect(px+size*0.14, py+size*0.12, size*0.5, size*0.22, size*0.1); ctx.fillStyle = "#fff"; ctx.fill();
        if (icon) {
            ctx.globalAlpha = alpha; ctx.font = `${size*0.6}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(icon, px+size/2, py+size/2+size*0.05);
        }
    }
    ctx.restore();
  }

  function drawGridPanel(){
    const padOuter = 8;
    roundRect(gridOriginX-padOuter, gridOriginY-padOuter, gridCols*cellSize+padOuter*2, gridRows*cellSize+padOuter*2, 14);
    ctx.fillStyle = "#2a1c11"; ctx.fill();
    for (let r=0;r<gridRows;r++){
      for (let c=0;c<gridCols;c++){
        const x = gridOriginX + c*cellSize, y = gridOriginY + r*cellSize;
        roundRect(x+2, y+2, cellSize-4, cellSize-4, cellSize*0.14);
        ctx.fillStyle = occupied[r][c] ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.06)";
        ctx.fill(); ctx.lineWidth = 1; ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.stroke();
        if (occupied[r][c]) drawBlockCell(x, y, cellSize, occupied[r][c].color, 1, getIconForTheme(occupied[r][c].templateIndex));
      }
    }
  }

  function drawDropPreview(){
    if (!dragPiece) return;
    const tCol = Math.round((dragPiece.x - gridOriginX)/cellSize), tRow = Math.round((dragPiece.y - gridOriginY)/cellSize);
    const valid = isValidPlacement(dragPiece, tRow, tCol);
    for (let r=0;r<dragPiece.rows;r++){
      for (let c=0;c<dragPiece.cols;c++){
        if (dragPiece.shape[r][c] !== 1) continue;
        const absR = tRow+r, absC = tCol+c;
        if (absR>=0 && absR<gridRows && absC>=0 && absC<gridCols){
            roundRect(gridOriginX + absC*cellSize+2, gridOriginY + absR*cellSize+2, cellSize-4, cellSize-4, cellSize*0.14);
            ctx.fillStyle = valid ? "rgba(46,204,113,0.5)" : "rgba(231,76,60,0.5)"; ctx.fill();
        }
      }
    }
  }

  function drawPiece(p, alpha, s = cellSize){
    const icon = getIconForTheme(p.templateIndex);
    for(let r=0;r<p.rows;r++) for(let c=0;c<p.cols;c++) if(p.shape[r][c]===1) drawBlockCell(p.x+c*s, p.y+r*s, s, p.color, alpha, icon);
  }

  function spawnCoins(x, y) { for(let i=0; i<5; i++) particles.push({x: x+cellSize/2, y: y+cellSize/2, vx: (Math.random()-0.5)*8, vy: (Math.random()-1)*8-2, life: 1.0, type: 'coin'}); }
  function updateAndDrawParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.life -= 0.03;
          if (p.life <= 0) particles.splice(i, 1);
          else {
              ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = "#FFD700";
              ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
              ctx.strokeStyle = "#B8860B"; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
          }
      }
  }

  function loop() {
    ctx.clearRect(0,0,logicalWidth,logicalHeight); drawGridPanel();
    
    if (activeBooster) {
        ctx.save(); ctx.fillStyle = "rgba(231, 76, 60, 0.15)";
        roundRect(gridOriginX, gridOriginY, gridCols*cellSize, gridRows*cellSize, 14); ctx.fill();
        ctx.fillStyle = "#ff7675"; ctx.font = "bold 16px 'Segoe UI'"; ctx.textAlign = "center"; ctx.fillText("💣 انقر على منطقة لتفجيرها", logicalWidth/2, gridOriginY - 12); ctx.restore();
    }

    if (dragPiece) drawDropPreview();
    pieces.forEach(p => { if (!p.placed && p !== dragPiece) drawPiece(p, 1, animating.has(p.id) ? p.animSize : trayCellSize); });
    if (dragPiece) drawPiece(dragPiece, 0.95, cellSize); updateAndDrawParticles(); animationFrameId = requestAnimationFrame(loop);
  }

  function isValidPlacement(piece, row, col){
    for (let r=0;r<piece.rows;r++) for (let c=0;c<piece.cols;c++){
        if (piece.shape[r][c] !== 1) continue;
        const absR = row+r, absC = col+c;
        if (absR<0 || absR>=gridRows || absC<0 || absC>=gridCols || occupied[absR][absC] !== null) return false;
    }
    return true;
  }

  function saveState() {
      previousState = { occupied: occupied.map(row => row.map(cell => cell ? {...cell} : null)), pieces: JSON.parse(JSON.stringify(pieces)), score: score, currentLevel: currentLevel };
  }

  function placePiece(piece, r, c){
    saveState(); playSound('place');
    for(let i=0;i<piece.rows;i++) for(let j=0;j<piece.cols;j++) if(piece.shape[i][j]===1) occupied[r+i][c+j] = {color: piece.color, templateIndex: piece.templateIndex};
    piece.placed = true; checkLines();
    if(pieces.every(p => p.placed)) { pieces = []; generateTrayPieces(); } else { checkGameOver(); } updateButtonsState();
  }

  function checkLines() {
      let rowsToClear = [], colsToClear = [];
      for(let r=0; r<gridRows; r++) if(occupied[r].every(c => c !== null)) rowsToClear.push(r);
      for(let c=0; c<gridCols; c++) if(occupied.every(row => row[c] !== null)) colsToClear.push(c);

      const hasCrush = rowsToClear.length > 0 || colsToClear.length > 0;
      if(hasCrush) playSound('crush');

      function clearCell(r, c) { const px = gridOriginX+c*cellSize, py = gridOriginY+r*cellSize; spawnCoins(px, py); occupied[r][c] = null; score += 10; }
      rowsToClear.forEach(r => { for(let c=0; c<gridCols; c++) clearCell(r, c); });
      colsToClear.forEach(c => { for(let r=0; r<gridRows; r++) if(occupied[r][c]) clearCell(r, c); });

      if(hasCrush) { updateScoreDisplay(); updateButtonsState(); checkLevelProgress(); }
  }

  function checkLevelProgress() {
      if (gameMode === 'levels' && score >= currentLevel * 100) {
          playSound('win'); currentLevel++; localStorage.setItem('blockCrushLevel', currentLevel); savedLevelSpan.textContent = currentLevel;
          document.getElementById('modalTitle').textContent = "🎉 مستوى مكتمل!";
          document.getElementById('modalText').textContent = `لقد جمعت النقود المطلوبة وانتقلت للمستوى ${currentLevel}.`;
          document.getElementById('modalNextBtn').style.display = 'block'; document.getElementById('gameOverModal').classList.remove('hidden');
      }
  }

  function checkGameOver() {
      let canPlaceAny = pieces.filter(p=>!p.placed).some(p => { for(let r=0; r<gridRows; r++) for(let c=0; c<gridCols; c++) if(isValidPlacement(p, r, c)) return true; return false; });
      if(!canPlaceAny) {
          document.getElementById('modalTitle').textContent = "انتهت اللعبة"; document.getElementById('modalText').textContent = `لا توجد حركات ممكنة. لقد جمعت ${score} 🪙!`;
          document.getElementById('modalNextBtn').style.display = 'none'; document.getElementById('gameOverModal').classList.remove('hidden');
      }
  }

  function undoMove() {
      if (!previousState || previousState.score < 100) return;
      playSound('undo');
      occupied = previousState.occupied.map(r => r.map(c => c ? {...c} : null)); pieces = JSON.parse(JSON.stringify(previousState.pieces));
      score = previousState.score - 100; currentLevel = previousState.currentLevel; previousState = null; 
      layoutTrayPositions(); updateScoreDisplay(); updateButtonsState(); document.getElementById('gameOverModal').classList.add('hidden');
  }

  function animatePieceTo(piece, tx, ty, dur){
    const sx = piece.x, sy = piece.y, sSize = cellSize, tSize = trayCellSize, start = performance.now();
    animating.add(piece.id); piece.animSize = sSize;
    function step(now){
      let t = Math.min(1, (now-start)/dur); const e = 1 - Math.pow(1-t, 3);
      piece.x = sx + (tx-sx)*e; piece.y = sy + (ty-sy)*e; piece.animSize = sSize + (tSize-sSize)*e;
      if (t < 1) requestAnimationFrame(step); else { piece.x = tx; piece.y = ty; piece.animSize = tSize; animating.delete(piece.id); }
    }
    requestAnimationFrame(step);
  }

  function getCanvasCoords(evt){
    const rect = canvas.getBoundingClientRect(); return { x: (evt.clientX - rect.left) * (logicalWidth / rect.width), y: (evt.clientY - rect.top) * (logicalHeight / rect.height) };
  }

  function onPointerDown(evt){
    if (document.querySelectorAll('.overlay:not(.hidden)').length > 0) return;
    const {x,y} = getCanvasCoords(evt);
    
    if (activeBooster) {
        const col = Math.floor((x - gridOriginX) / cellSize); const row = Math.floor((y - gridOriginY) / cellSize);
        if (row >= 0 && row < gridRows && col >= 0 && col < gridCols) {
            if (activeBooster === 'bomb') {
                let cleared = false;
                for (let r = Math.max(0, row - 1); r <= Math.min(gridRows - 1, row + 1); r++) {
                    for (let c = Math.max(0, col - 1); c <= Math.min(gridCols - 1, col + 1); c++) {
                        if (occupied[r][c]) { occupied[r][c] = null; spawnCoins(gridOriginX + c * cellSize, gridOriginY + r * cellSize); cleared = true; }
                    }
                }
                if (cleared) { playSound('bomb'); score -= 100; activeBooster = null; }
            }
            updateScoreDisplay(); updateButtonsState(); checkGameOver();
        }
        return; 
    }

    let hit = null, best = Infinity;
    for (let p of pieces) {
        if (p.placed || animating.has(p.id)) continue;
        const w = p.cols * trayCellSize, h = p.rows * trayCellSize;
        if (x >= p.x-30 && x <= p.x+w+30 && y >= p.y-30 && y <= p.y+h+30) { const d = Math.hypot(x - (p.x+w/2), y - (p.y+h/2)); if (d < best) { best = d; hit = p; } }
    }
    if (!hit) return;
    
    playSound('drag'); dragPiece = hit; dragOffsetX = (hit.cols * cellSize) / 2; dragOffsetY = (hit.rows * cellSize) + 40; 
    dragPiece.x = x - dragOffsetX; dragPiece.y = y - dragOffsetY; canvas.setPointerCapture(evt.pointerId);
  }

  function onPointerMove(evt){
    if (!dragPiece) return; const {x,y} = getCanvasCoords(evt); dragPiece.x = x - dragOffsetX; dragPiece.y = y - dragOffsetY;
  }

  function onPointerUp(){
    if (!dragPiece) return; const p = dragPiece; dragPiece = null;
    const tCol = Math.round((p.x - gridOriginX)/cellSize), tRow = Math.round((p.y - gridOriginY)/cellSize);
    if (isValidPlacement(p, tRow, tCol)) placePiece(p, tRow, tCol); else animatePieceTo(p, p.trayX, p.trayY, 200);
  }

  canvas.addEventListener('pointerdown', onPointerDown); canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp); canvas.addEventListener('pointercancel', onPointerUp);

  document.getElementById('btnModeLevels').addEventListener('click', () => initGame('levels'));
  document.getElementById('btnModeClassic').addEventListener('click', () => initGame('classic'));
  document.getElementById('undoBtn').addEventListener('click', undoMove);
  topMenuBtn.addEventListener('click', () => document.getElementById('mainMenu').classList.remove('hidden'));
  document.getElementById('btnSettings').addEventListener('click', () => {
      document.getElementById('settingsModal').classList.remove('hidden');
      if(currentTheme === 'custom_emoji' || currentTheme === 'custom_image') { themeSelect.value = currentTheme; }
  });
  document.getElementById('closeSettingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.add('hidden'));
  
  topBuyBtn.addEventListener('click', () => { if (score >= 150) { initStoreUI(); document.getElementById('storeModal').classList.remove('hidden'); } });
  document.getElementById('closeStoreBtn').addEventListener('click', () => document.getElementById('storeModal').classList.add('hidden'));
  
  document.getElementById('modalReplayBtn').addEventListener('click', () => initGame(gameMode));
  document.getElementById('modalNextBtn').addEventListener('click', () => initGame('levels'));
  document.getElementById('modalMenuBtn').addEventListener('click', () => { document.getElementById('gameOverModal').classList.add('hidden'); document.getElementById('mainMenu').classList.remove('hidden'); });

})();
</script>
</body>
