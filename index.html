<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Block Crush — Pro Visuals Edition</title>
<style>
  :root{
    --wood-dark:#5c3a21;
    --wood-mid:#7a4c28;
    --wood-light:#9c6b3e;
    --panel:#3e2a1a;
    --accent:#f4c542;
    --accent-dark:#c99a2e;
    --danger:#e74c3c;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    font-family:'Trebuchet MS','Segoe UI',Verdana,sans-serif;
    background:
      repeating-linear-gradient(90deg, var(--wood-mid) 0px, var(--wood-light) 6px, var(--wood-mid) 12px),
      var(--wood-dark);
    color:#fff3e0;
    overflow-x:hidden;
    user-select: none;
  }
  #app{
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px 10px 30px;
  }
  header{
    width:100%;
    max-width:640px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom:10px;
    position: relative;
    z-index: 10;
  }
  .stats-row {
    display: flex;
    flex-wrap: nowrap;
    justify-content: space-between;
    width: 100%;
    gap: 8px;
  }
  .stat-box {
    flex: 1;
    text-align: center;
    background:var(--panel);
    padding:6px 4px;
    border-radius:12px;
    border:2px solid var(--accent-dark);
    box-shadow:inset 0 2px 4px rgba(0,0,0,.4);
    font-size:clamp(11px,3vw,14px);
    font-weight: bold;
    color: #ffd700;
    transition: transform 0.2s ease;
  }
  .stat-box span { display: block; font-size: 0.8em; color: #fff3e0; margin-bottom: 4px;}
  .clickable-stat { cursor: pointer; transition: all 0.2s; background: linear-gradient(180deg, var(--wood-mid), var(--panel)); }
  .clickable-stat:active { transform: translateY(2px); }

  /* أنيميشن نبض الهدف */
  @keyframes goalPulse { 
      0% { transform: scale(1); } 
      50% { transform: scale(1.15); box-shadow: 0 0 15px var(--accent); border-color: #fff; } 
      100% { transform: scale(1); } 
  }
  .pulse-anim { animation: goalPulse 0.4s ease-out; }

  #canvasWrap{
    width:100%;
    max-width:640px;
    background:linear-gradient(180deg,#4a2f1a,#3a2413);
    border:6px solid var(--wood-mid);
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.5), inset 0 0 20px rgba(0,0,0,.5);
    padding:6px;
    touch-action:none;
    position: relative;
    z-index: 1;
  }
  canvas{
    display:block;
    width:100%;
    height:auto;
    border-radius:12px;
    background:#2f2015;
    touch-action:none;
  }
  .controls-group { width: 100%; max-width: 640px; margin-top: 15px; }
  .controls{ display:flex; gap:10px; flex-wrap:nowrap; justify-content:center; }
  
  button.woodBtn{
    flex: 1;
    font-family:inherit;
    font-size:15px;
    font-weight:bold;
    color:#fff3e0;
    background:linear-gradient(180deg,var(--wood-light),var(--wood-mid));
    border:2px solid var(--panel);
    border-radius:10px;
    padding:12px 10px;
    cursor:pointer;
    box-shadow:0 4px 0 var(--panel), 0 6px 10px rgba(0,0,0,.4);
    transition:all .1s ease;
  }
  button.woodBtn:active{
    transform:translateY(3px);
    box-shadow:0 1px 0 var(--panel), 0 2px 6px rgba(0,0,0,.4);
  }
  button.gold{
    background:linear-gradient(180deg,#ffe27a,var(--accent-dark));
    color:#3a2413; border-color:#7a5a1a; box-shadow:0 4px 0 #7a5a1a, 0 6px 10px rgba(0,0,0,.4);
  }
  button.gold:active{ box-shadow:0 1px 0 #7a5a1a, 0 2px 6px rgba(0,0,0,.4); }
  
  button.booster-active {
      background: linear-gradient(180deg, #ff7675, var(--danger));
      color: white;
      border-color: #c0392b;
      box-shadow: 0 4px 0 #c0392b, 0 0 15px rgba(231, 76, 60, 0.8);
      animation: pulse 1s infinite alternate;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

  .disabled {
      opacity: 0.5;
      cursor: not-allowed !important;
      pointer-events: none;
      filter: grayscale(100%);
  }

  .overlay{
    position:fixed; inset:0; background:rgba(20,12,6,.85);
    display:flex; align-items:center; justify-content:center;
    z-index:50; flex-direction: column;
  }
  .hidden { display: none !important; }
  .modalBox{
    background:linear-gradient(180deg,#7a4c28,#4a2f1a);
    border:4px solid var(--accent);
    border-radius:18px; padding:30px 34px;
    text-align:center; max-width:90vw; width: 400px;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
    animation:pop .35s ease;
  }
  @keyframes pop{
    0%{ transform:scale(.6); opacity:0; }
    70%{ transform:scale(1.06); opacity:1; }
    100%{ transform:scale(1); }
  }
  .modalBox h2{ margin:0 0 15px; color:var(--accent); font-size:28px; text-shadow:2px 2px 0 #2c1c10; }
  .modalBox p{ margin:0 0 20px; font-size:16px; line-height: 1.5; }
  .menu-btns { display: flex; flex-direction: column; gap: 15px; }

  .setting-group { margin-bottom: 15px; text-align: right; }
  .setting-group label { display: block; margin-bottom: 5px; color: #ffd700; font-weight: bold; }
  .setting-group select { width: 100%; padding: 8px; border-radius: 8px; background: #2a1c11; color: #fff; border: 2px solid var(--accent-dark); font-family: inherit; font-size: 16px;}

  #storeGrid {
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
    max-height: 45vh; overflow-y: auto; padding: 10px;
    background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 20px;
  }
  #storeGrid::-webkit-scrollbar { width: 8px; }
  #storeGrid::-webkit-scrollbar-track { background: #3a2413; border-radius: 4px; }
  #storeGrid::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
</style>
</head>
<body>

<div id="mainMenu" class="overlay">
  <div class="modalBox">
    <h2>🧩 Block Crush</h2>
    <div class="menu-btns">
      <button class="woodBtn gold" id="btnModeLevels">🌟 وضع المستويات (<span id="savedLevelSpan">1</span>)</button>
      <button class="woodBtn" id="btnModeClassic">♾️ الوضع الكلاسيكي</button>
      <button class="woodBtn" id="btnSettings">⚙️ الإعدادات (الأشكال والأصوات)</button>
    </div>
  </div>
</div>

<div id="settingsModal" class="overlay hidden">
  <div class="modalBox">
    <h2>⚙️ الإعدادات</h2>
    <div class="setting-group">
      <label>🎨 شكل البلوكات:</label>
      <select id="themeSelect">
        <option value="hearts">❤️🌸 قلوب وزهور (الأساسي)</option>
        <option value="wood">🪵 خشبي (كلاسيكي)</option>
        <option value="candy">🍬 حلوى (لامع)</option>
        <option value="icecream">🍦 آيس كريم (باستيل)</option>
        <option value="emoji">🎉 إيموجي متنوع</option>
        <option value="animals">🐾 حيوانات فقط</option>
      </select>
    </div>
    <div class="setting-group">
      <label>🎵 الأصوات:</label>
      <select id="soundSelect">
        <option value="classic">🎹 كلاسيكي (ديجيتال)</option>
        <option value="bubble">🫧 فقاعات المائية</option>
        <option value="marimba">🪵 خشبي / ماريمبا</option>
      </select>
    </div>
    <div class="menu-btns">
      <button class="woodBtn" id="closeSettingsBtn">✔ حفظ وإغلاق</button>
    </div>
  </div>
</div>

<div id="storeModal" class="overlay hidden">
  <div class="modalBox" style="width: 480px;">
    <h2>🛒 متجر البلوكات</h2>
    <p>التكلفة: 150 🪙<br><small style="color:#aaa;">سيتم استبدال قطعة فارغة بالجديدة.</small></p>
    <div id="storeGrid"></div>
    <div class="menu-btns">
      <button class="woodBtn" id="closeStoreBtn">❌ إلغاء وإغلاق</button>
    </div>
  </div>
</div>

<div id="gameOverModal" class="overlay hidden">
  <div class="modalBox">
    <h2 id="modalTitle">نهاية اللعبة</h2>
    <p id="modalText"></p>
    <div class="menu-btns">
      <button class="woodBtn gold" id="modalNextBtn" class="hidden">التالي ▶</button>
      <button class="woodBtn" id="modalReplayBtn">↺ العب مجدداً</button>
      <button class="woodBtn" id="modalMenuBtn">☰ القائمة الرئيسية</button>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="stats-row">
      <div class="stat-box hidden" id="goalBox"><span>الهدف 🎯</span><div id="goalLabel">0 / 0</div></div>
      <div class="stat-box" id="topScoreBox"><span>أعلى نقطة 🏆</span><div id="topScoreLabel">0 🪙</div></div>
      <div class="stat-box"><span>النقود 🪙</span><div id="scoreLabel">0 🪙</div></div>
      <div class="stat-box clickable-stat" id="topBuyBtn"><span>المتجر 🛒</span><div id="storeStatusLabel">150 🪙</div></div>
      <div class="stat-box clickable-stat" id="topMenuBtn"><span>القائمة ☰</span><div>الرئيسية</div></div>
    </div>
  </header>

  <div id="canvasWrap">
    <canvas id="game"></canvas>
  </div>

  <div class="controls-group">
    <div class="controls">
      <button class="woodBtn gold disabled" id="btnRotate">🔄 تدوير (30)</button>
      <button class="woodBtn gold disabled" id="btnBomb">💣 قنبلة (100)</button>
      <button class="woodBtn disabled" id="undoBtn">↩ تراجع (100)</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  let currentTheme = localStorage.getItem('blockCrushTheme') || 'hearts';
  let currentSound = localStorage.getItem('blockCrushSound') || 'classic';

  const themeSelect = document.getElementById('themeSelect');
  const soundSelect = document.getElementById('soundSelect');
  themeSelect.value = currentTheme;
  soundSelect.value = currentSound;

  themeSelect.addEventListener('change', e => {
      currentTheme = e.target.value;
      localStorage.setItem('blockCrushTheme', currentTheme);
      if (gameMode === 'levels') setLevelTargetIcon(); // تحديث هدف المستوى فوراً
      if (!animationFrameId) loop(); 
  });
  
  soundSelect.addEventListener('change', e => {
      currentSound = e.target.value;
      localStorage.setItem('blockCrushSound', currentSound);
  });

  let audioCtx;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, type, duration, vol=0.1, slideFreq = null) {
    if(!audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if(slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  }

  function playSound(type) {
    initAudio();
    if(currentSound === 'classic') {
        if(type === 'drag') { playTone(300, 'sine', 0.1, 0.2); setTimeout(()=>playTone(450, 'sine', 0.1, 0.2), 50); }
        else if (type === 'place') playTone(150, 'square', 0.1, 0.3);
        else if (type === 'crush') { playTone(988, 'sine', 0.1, 0.2); setTimeout(()=>playTone(1318, 'sine', 0.25, 0.3), 100); }
    } else if (currentSound === 'bubble') {
        if(type === 'drag') playTone(400, 'sine', 0.15, 0.2, 600);
        else if (type === 'place') playTone(300, 'sine', 0.15, 0.2, 200);
        else if (type === 'crush') { playTone(600, 'sine', 0.1, 0.2, 1200); setTimeout(()=>playTone(800, 'sine', 0.1, 0.2, 1600), 100); }
    } else if (currentSound === 'marimba') {
        if(type === 'drag') { playTone(350, 'triangle', 0.08, 0.3); setTimeout(()=>playTone(500, 'triangle', 0.08, 0.3), 50); }
        else if (type === 'place') playTone(200, 'triangle', 0.08, 0.4);
        else if (type === 'crush') { playTone(800, 'triangle', 0.1, 0.3); setTimeout(()=>playTone(1000, 'triangle', 0.1, 0.3), 80); }
    }
    if (type === 'undo') { playTone(300, 'sawtooth', 0.1, 0.2); setTimeout(()=>playTone(200, 'sawtooth', 0.2, 0.2), 100); }
    else if (type === 'win') { playTone(400, 'sine', 0.1, 0.2); setTimeout(()=>playTone(600, 'sine', 0.1, 0.2), 100); setTimeout(()=>playTone(800, 'sine', 0.3, 0.2), 200); }
    else if (type === 'buy') { playTone(600, 'square', 0.1, 0.2); setTimeout(()=>playTone(900, 'square', 0.15, 0.2), 100); }
    else if (type === 'bomb') { playTone(100, 'sawtooth', 0.4, 0.5, 50); setTimeout(()=>playTone(200, 'square', 0.3, 0.4), 100); }
    else if (type === 'pop') { playTone(800, 'sine', 0.05, 0.2, 1200); } // صوت مخصص عند وصول الطائر للهدف
  }
  document.body.addEventListener('pointerdown', initAudio, {once:true});

  const gridRows = 8, gridCols = 8;
  const SHAPE_TEMPLATES = [
    // 1 - الخطوط المستقيمة (الأطوال 4 و 5 كما في الصور 3، 4، 5، 8)
    { shape: [[1,1,1,1]], color: "#ff6b6b", icon: "💎" },
    { shape: [[1],[1],[1],[1]], color: "#4fa8e0", icon: "❤️" },
    { shape: [[1,1,1,1,1]], color: "#ff6b6b", icon: "❤️" },
    { shape: [[1],[1],[1],[1],[1]], color: "#ffb142", icon: "🐸" },

    // 2 - المربعات (2x2 و 3x3 كما في الصور 1 و 6)
    { shape: [[1,1],[1,1]], color: "#4fa8e0", icon: "🐸" },
    { shape: [[1,1,1],[1,1,1],[1,1,1]], color: "#4fa8e0", icon: "🦄" },

    // 3 - المستطيل (2x3 كما في الصورة 3)
    { shape: [[1,1,1],[1,1,1]], color: "#ffb142", icon: "🦄" },

    // 4 - أشكال حرف T مسبقة الدوران (كما في الصور 1، 2، 6، 7، 8)
    { shape: [[1,1,1],[0,1,0]], color: "#4fa8e0", icon: "⭐" },
    { shape: [[0,1,0],[1,1,1]], color: "#ff6b6b", icon: "🦊" },
    { shape: [[1,0],[1,1],[1,0]], color: "#ffb142", icon: "🐢" },
    { shape: [[0,1],[1,1],[0,1]], color: "#ff6b6b", icon: "🐢" },

    // 5 - أشكال حرف L بحالات دوران مختلفة (كما في الصور 2، 4، 6، 7، 8)
    { shape: [[1,0,0],[1,1,1]], color: "#4fa8e0", icon: "🐢" },
    { shape: [[0,0,1],[1,1,1]], color: "#ffb142", icon: "🐢" },
    { shape: [[1,1,1],[1,0,0]], color: "#4fa8e0", icon: "🐷" },
    { shape: [[0,1],[0,1],[1,1]], color: "#4fa8e0", icon: "⚓" },
    { shape: [[1,0],[1,0],[1,1]], color: "#4fa8e0", icon: "⚓" },

    // 6 - حرف L الكبير ذو زاوية 3x3 وشكل Z (كما في الصور 5 و 7)
    { shape: [[1,0,0],[1,0,0],[1,1,1]], color: "#ff6b6b", icon: "⚓" },
    { shape: [[1,1,0],[0,1,1]], color: "#ffb142", icon: "⚓" }
  ];

  const ANIMALS_ICONS = ["🐭","🐰","🐰","🐸","🐸","🦄","🦄","🐼","🦊","🐢","🐢","🐢","🐢","🐷","🐨","🐨","🐨","🐨"];
  const HEARTS_FLOWERS_ICONS = ["🌸","❤️","❤️","🌷","🌷","💐","💐","💖","🌹","💕","💕","💕","💕","🌺","💗","💗","💗","💗"];
  const EMOJI_ICONS = ["💎","⚡","⚡","🔥","🔥","🌈","🌈","⭐","🎯","🍄","🍄","🍄","🍄","🎪","🚀","🚀","🚀","🚀"];

  function getIconForTheme(idx) {
    if (idx === undefined || idx === null) return "";
    if (currentTheme === 'animals') return ANIMALS_ICONS[idx] || "";
    if (currentTheme === 'hearts') return HEARTS_FLOWERS_ICONS[idx] || "";
    if (currentTheme === 'emoji') return EMOJI_ICONS[idx] || "";
    return "";
  }

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const canvasWrap = document.getElementById('canvasWrap');
  
  const scoreLabel = document.getElementById('scoreLabel');
  const topScoreLabel = document.getElementById('topScoreLabel');
  const goalLabel = document.getElementById('goalLabel');
  const topScoreBox = document.getElementById('topScoreBox');
  const goalBox = document.getElementById('goalBox');
  const savedLevelSpan = document.getElementById('savedLevelSpan');
  
  const undoBtn = document.getElementById('undoBtn');
  const topBuyBtn = document.getElementById('topBuyBtn');
  const storeStatusLabel = document.getElementById('storeStatusLabel');
  const topMenuBtn = document.getElementById('topMenuBtn');
  const btnRotate = document.getElementById('btnRotate');
  const btnBomb = document.getElementById('btnBomb');

  let gameMode = 'classic';
  let currentLevel = parseInt(localStorage.getItem('blockCrushLevel')) || 1;
  let topScore = parseInt(localStorage.getItem('blockCrushTopScore')) || 0;
  
  let levelProgress = 0;
  let levelTarget = 0;
  let activeTargetIcon = "";

  let logicalWidth = 600, logicalHeight = 700;
  let cellSize = 40, trayCellSize = 26;
  let gridOriginX = 0, gridOriginY = 0, trayTop = 0;

  let occupied = [];
  let pieces = [];
  let dragPiece = null;
  let dragOffsetX = 0, dragOffsetY = 0;
  let animating = new Set();
  
  let score = 0; 
  let previousState = null;
  let particles = [];
  let flyingParticles = []; // مصفوفة جزيئات الطيران
  let nextPieceId = 0;
  let animationFrameId;
  let activeBooster = null; 

  let currentBag = [];

  function setLevelTargetIcon() {
      // اختيار أيقونة هدف موحدة للمستوى بناءً على السمة الحالية
      let fallbackIndex = (currentLevel - 1) % 18;
      activeTargetIcon = getIconForTheme(fallbackIndex) || "💎";
      updateScoreDisplay();
  }

  function fillBag() {
      currentBag = [];
      let baseBag = Array.from({length: SHAPE_TEMPLATES.length}, (_, i) => i);
      if (currentLevel <= 5) { baseBag.push(0, 0, 1, 2, 7); } 
      else if (currentLevel >= 16) {
          baseBag = baseBag.filter(idx => idx !== 0);
          baseBag.push(8, 5, 6, 14, 15, 16, 17);
      }
      currentBag = baseBag.sort(() => Math.random() - 0.5);
  }

  function getOccupiedCount() {
      let count = 0;
      for (let r=0; r<gridRows; r++) for (let c=0; c<gridCols; c++) if (occupied[r][c] !== null) count++;
      return count; 
  }

  function canFit(templateIdx) {
      let t = SHAPE_TEMPLATES[templateIdx];
      let tempPiece = { shape: t.shape, rows: t.shape.length, cols: t.shape[0].length };
      for (let r = 0; r < gridRows; r++) {
          for (let c = 0; c < gridCols; c++) {
              if (isValidPlacement(tempPiece, r, c)) return true;
          }
      }
      return false;
  }

  function generateTrayPieces() {
      pieces = [];
      let trayIndices = [];

      for (let i = 0; i < 3; i++) {
          if (currentBag.length === 0) fillBag();
          trayIndices.push(currentBag.pop());
      }

      let fits = trayIndices.some(idx => canFit(idx));
      if (!fits) {
          let occupancyPercentage = (getOccupiedCount() / 64) * 100;
          let fallbackIndices = [];
          if (currentLevel <= 5) fallbackIndices = [0, 1, 2]; 
          else if (currentLevel <= 15) { if (occupancyPercentage < 85) fallbackIndices = [0, 1, 2, 3, 4, 7]; } 
          else { if (occupancyPercentage < 75) fallbackIndices = [1, 2, 3, 4]; }
          for (let fbIdx of fallbackIndices) { if (canFit(fbIdx)) { trayIndices[0] = fbIdx; break; } }
      }

      for(let i=0; i<3; i++) {
          let idx = trayIndices[i]; let t = SHAPE_TEMPLATES[idx];
          pieces.push({
              id: nextPieceId++, shape: t.shape, rows: t.shape.length, cols: t.shape[0].length,
              color: t.color, templateIndex: idx, placed: false, x: 0, y: 0, trayX: 0, trayY: 0, animSize: 0
          });
      }
      layoutTrayPositions(); checkGameOver();
  }

  savedLevelSpan.textContent = currentLevel;
  topScoreLabel.textContent = `${topScore} 🪙`;

  function initStoreUI() {
      const storeGrid = document.getElementById('storeGrid');
      storeGrid.innerHTML = '';
      SHAPE_TEMPLATES.forEach((template, index) => {
          const btn = document.createElement('div');
          btn.style.cssText = `cursor:pointer; padding:8px; background:#2f2015; border-radius:8px; display:grid; gap:2px; border:2px solid transparent;`;
          btn.style.gridTemplateRows = `repeat(${template.shape.length}, 16px)`;
          btn.style.gridTemplateColumns = `repeat(${template.shape[0].length}, 16px)`;
          btn.onmouseenter = () => btn.style.borderColor = template.color;
          btn.onmouseleave = () => btn.style.borderColor = 'transparent';
          for(let r=0; r<template.shape.length; r++) {
              for(let c=0; c<template.shape[0].length; c++) {
                  const cell = document.createElement('div');
                  if(template.shape[r][c]===1) { cell.style.background = template.color; cell.style.borderRadius = '3px'; }
                  btn.appendChild(cell);
              }
          }
          btn.onclick = () => purchaseBlock(index);
          storeGrid.appendChild(btn);
      });
  }
  initStoreUI();

  function purchaseBlock(index) {
      if (score < 150) return;
      score -= 150; playSound('buy'); updateScoreDisplay(); updateButtonsState();
      let targetPiece = pieces.find(p => !p.placed);
      if (!targetPiece) { generateTrayPieces(); targetPiece = pieces.find(p => !p.placed); }
      if (targetPiece) {
          Object.assign(targetPiece, {
              shape: SHAPE_TEMPLATES[index].shape,
              rows: SHAPE_TEMPLATES[index].shape.length,
              cols: SHAPE_TEMPLATES[index].shape[0].length,
              color: SHAPE_TEMPLATES[index].color,
              templateIndex: index
          });
          layoutTrayPositions();
      }
      document.getElementById('storeModal').classList.add('hidden');
      checkGameOver();
  }

  function initGame(mode){
    gameMode = mode; score = 0; previousState = null; activeBooster = null;
    currentBag = []; flyingParticles = [];
    
    if (mode === 'levels') {
        levelProgress = 0;
        levelTarget = 5 + (currentLevel * 3); // زيادة الهدف تدريجياً
        setLevelTargetIcon();
        goalBox.classList.remove('hidden');
        topScoreBox.classList.add('hidden');
    } else {
        goalBox.classList.add('hidden');
        topScoreBox.classList.remove('hidden');
    }

    updateScoreDisplay(); updateButtonsState();
    occupied = Array.from({length:gridRows}, () => Array(gridCols).fill(null));
    particles = []; pieces = []; nextPieceId = 0;
    generateTrayPieces(); resizeCanvas();
    document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
    if(!animationFrameId) loop();
  }

  function updateScoreDisplay() {
      scoreLabel.innerHTML = `${score} 🪙`;
      if(gameMode === 'levels') {
          goalLabel.innerHTML = `${levelProgress} / ${levelTarget} ${activeTargetIcon}`;
      } else {
          if(score > topScore) {
              topScore = score;
              localStorage.setItem('blockCrushTopScore', topScore);
              topScoreLabel.innerHTML = `${topScore} 🪙`;
          }
      }
  }

  function updateButtonsState() {
      undoBtn.classList.toggle('disabled', (!previousState || previousState.score < 100));
      topBuyBtn.classList.toggle('disabled', (score < 150));
      storeStatusLabel.style.color = (score >= 150) ? '#2ecc71' : '#fff3e0';
      btnRotate.classList.toggle('disabled', score < 30);
      btnBomb.classList.toggle('disabled', score < 100 && activeBooster !== 'bomb');
      btnBomb.classList.toggle('booster-active', activeBooster === 'bomb');
  }

  function toggleBooster(type, cost) {
      if (activeBooster === type) activeBooster = null;
      else if (score >= cost) activeBooster = type;
      updateButtonsState();
  }

  btnBomb.onclick = () => toggleBooster('bomb', 100);
  
  btnRotate.onclick = () => {
      if (score >= 30) {
          score -= 30; playSound('buy');
          pieces.filter(p => !p.placed).forEach(p => {
              let newShape = Array.from({length: p.cols}, () => Array(p.rows).fill(0));
              for(let r=0; r<p.rows; r++) for(let c=0; c<p.cols; c++) newShape[c][p.rows - 1 - r] = p.shape[r][c];
              p.shape = newShape; p.rows = p.shape.length; p.cols = p.shape[0].length;
          });
          layoutTrayPositions(); updateScoreDisplay(); updateButtonsState(); checkGameOver();
      }
  };

  function computeLayout(){
    const padding = 15;
    let availWidth = logicalWidth - padding*2;
    cellSize = Math.min((availWidth / gridCols), 50); 
    trayCellSize = cellSize * 0.65; 
    gridOriginX = (logicalWidth - (cellSize * gridCols))/2;
    gridOriginY = padding + 10;
    trayTop = gridOriginY + (cellSize * gridRows) + 40;
    logicalHeight = trayTop + (trayCellSize * 5) + 40;
    layoutTrayPositions();
  }

  function layoutTrayPositions(){
    const gap = 20;
    const unplacedPieces = pieces.filter(p => !p.placed);
    const totalWidth = unplacedPieces.reduce((sum,p)=> sum + p.cols*trayCellSize, 0) + gap*(unplacedPieces.length-1);
    let startX = (logicalWidth - totalWidth)/2;
    unplacedPieces.forEach(p => {
      p.trayX = startX; p.trayY = trayTop + (4 * trayCellSize - (p.rows * trayCellSize)) / 2;
      if (dragPiece !== p && !animating.has(p.id)){ p.x = p.trayX; p.y = p.trayY; }
      startX += (p.cols * trayCellSize) + gap;
    });
  }

  function resizeCanvas(){
    const dpr = window.devicePixelRatio || 1;
    logicalWidth = Math.min(canvasWrap.clientWidth, 640);
    if (logicalWidth < 280) logicalWidth = 280;
    computeLayout();
    canvas.width = Math.round(logicalWidth*dpr); canvas.height = Math.round(logicalHeight*dpr);
    canvas.style.width = logicalWidth+"px"; canvas.style.height = logicalHeight+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resizeCanvas);

  function roundRect(x,y,w,h,r){
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  // رسم مجسم ثلاثي الأبعاد واحترافي
  function drawBlockCell(px, py, size, color, alpha = 1, icon = ""){
    const pad = 1.5; ctx.save(); ctx.globalAlpha = alpha;
    if (currentTheme === 'candy') {
        roundRect(px+pad, py+pad, size-pad*2, size-pad*2, size*0.4); ctx.fillStyle = color; ctx.fill();
        ctx.globalAlpha = alpha * 0.6; roundRect(px+pad*2, py+pad*2, size-pad*4, (size-pad*4)*0.4, size*0.3); ctx.fillStyle = "#fff"; ctx.fill();
    } else if (currentTheme === 'icecream') {
        roundRect(px+pad, py+pad, size-pad*2, size-pad*2, size*0.2); ctx.fillStyle = color; ctx.fill();
        ctx.globalAlpha = 0.5; ctx.fillStyle = "#fff"; ctx.fill(); 
        ctx.globalAlpha = alpha; ctx.font = `${size*0.5}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText("🍦", px+size/2, py+size/2);
    } else {
        // الشكل الافتراضي المطور (تدرج و3D)
        roundRect(px+pad, py+pad, size-pad*2, size-pad*2, size*0.16);
        ctx.fillStyle = color; ctx.fill();
        
        // التدرج اللوني المجسم
        const grad = ctx.createLinearGradient(px, py, px, py + size);
        grad.addColorStop(0, "rgba(255,255,255,0.3)");
        grad.addColorStop(0.5, "rgba(255,255,255,0)");
        grad.addColorStop(1, "rgba(0,0,0,0.4)");
        ctx.fillStyle = grad; ctx.fill();
        
        // الحواف الخارجية
        ctx.lineWidth = 1.5; ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.stroke();
        
        // إطار داخلي يعطي إيحاء بالارتفاع
        ctx.globalAlpha = alpha * 0.4;
        roundRect(px+pad+2, py+pad+2, size-pad*4, size-pad*4, size*0.1);
        ctx.strokeStyle = "#ffffff"; ctx.stroke();

        if (icon) {
            ctx.globalAlpha = alpha;
            // إضافة ظل جميل تحت الأيقونة
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 4;
            ctx.shadowOffsetY = 2;
            ctx.font = `${size*0.55}px Arial`;
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(icon, px+size/2, py+size/2+size*0.05);
            ctx.shadowColor = 'transparent'; // إعادة ضبط
        }
    }
    ctx.restore();
  }

  function drawGridPanel(){
    const padOuter = 8;
    roundRect(gridOriginX-padOuter, gridOriginY-padOuter, gridCols*cellSize+padOuter*2, gridRows*cellSize+padOuter*2, 14);
    ctx.fillStyle = "#2a1c11"; ctx.fill();
    for (let r=0;r<gridRows;r++){
      for (let c=0;c<gridCols;c++){
        const x = gridOriginX + c*cellSize, y = gridOriginY + r*cellSize;
        roundRect(x+2, y+2, cellSize-4, cellSize-4, cellSize*0.14);
        ctx.fillStyle = occupied[r][c] ? "rgba(255,255,255,0.02)" : "rgba(255,255,255,0.06)";
        ctx.fill(); ctx.lineWidth = 1; ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.stroke();
        if (occupied[r][c]) {
            let cellIcon = getIconForTheme(occupied[r][c].templateIndex);
            // في وضع المستويات، تستبدل الأيقونات الأساسية بهدف المستوى إذا كانت تحتوي على أيقونة
            let finalIcon = cellIcon ? (gameMode === 'levels' ? activeTargetIcon : cellIcon) : "";
            drawBlockCell(x, y, cellSize, occupied[r][c].color, 1, finalIcon);
        }
      }
    }
  }

  function drawDropPreview(){
    if (!dragPiece) return;
    const tCol = Math.round((dragPiece.x - gridOriginX)/cellSize), tRow = Math.round((dragPiece.y - gridOriginY)/cellSize);
    const valid = isValidPlacement(dragPiece, tRow, tCol);
    for (let r=0;r<dragPiece.rows;r++){
      for (let c=0;c<dragPiece.cols;c++){
        if (dragPiece.shape[r][c] !== 1) continue;
        const absR = tRow+r, absC = tCol+c;
        if (absR>=0 && absR<gridRows && absC>=0 && absC<gridCols){
            roundRect(gridOriginX + absC*cellSize+2, gridOriginY + absR*cellSize+2, cellSize-4, cellSize-4, cellSize*0.14);
            ctx.fillStyle = valid ? "rgba(46,204,113,0.5)" : "rgba(231,76,60,0.5)"; ctx.fill();
        }
      }
    }
  }

  function drawPiece(p, alpha, s = cellSize){
    let pieceIcon = getIconForTheme(p.templateIndex);
    let finalIcon = pieceIcon ? (gameMode === 'levels' ? activeTargetIcon : pieceIcon) : "";
    for(let r=0;r<p.rows;r++) for(let c=0;c<p.cols;c++) if(p.shape[r][c]===1) drawBlockCell(p.x+c*s, p.y+r*s, s, p.color, alpha, finalIcon);
  }

  function spawnCoins(x, y) {
      for(let i=0; i<5; i++) particles.push({x: x+cellSize/2, y: y+cellSize/2, vx: (Math.random()-0.5)*8, vy: (Math.random()-1)*8-2, life: 1.0, type: 'coin'});
  }

  // إضافة الجزيئات الطائرة بانحناء سلس (Bezier)
  function spawnFlyingItem(x, y, icon) {
      flyingParticles.push({
          startX: x, startY: y,
          x: x, y: y,
          targetX: logicalWidth / 4, // تتجه نحو الجزء العلوي الأيسر حيث صندوق الهدف
          targetY: -40, // تطير خارج اللوحة لأعلى لتصل للواجهة
          icon: icon,
          progress: 0,
          speed: 0.02 + Math.random() * 0.015,
          cpX: x + (Math.random() - 0.5) * 250, // نقطة التحكم لعمل قوس جميل
          cpY: y - 100 - Math.random() * 100
      });
  }

  function updateAndDrawParticles() {
      // الجزيئات العادية المتناثرة
      for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.life -= 0.03;
          if (p.life <= 0) particles.splice(i, 1);
          else {
              ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = "#FFD700";
              ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fill();
              ctx.strokeStyle = "#B8860B"; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
          }
      }

      // الجزيئات الطائرة نحو الهدف
      for (let i = flyingParticles.length - 1; i >= 0; i--) {
          let p = flyingParticles[i];
          p.progress += p.speed;
          
          if (p.progress >= 1) {
              // عند الوصول للهدف
              flyingParticles.splice(i, 1);
              if (gameMode === 'levels') {
                  levelProgress++;
                  playSound('pop'); 
                  updateScoreDisplay();
                  // تفعيل النبض للواجهة
                  goalBox.classList.remove('pulse-anim');
                  void goalBox.offsetWidth; // إجبار المتصفح على التحديث
                  goalBox.classList.add('pulse-anim');
                  checkLevelProgress(); // فحص الفوز بعد الاستلام
              }
          } else {
              // دالة المنحنى (Quadratic Bezier Curve)
              let t = p.progress;
              p.x = Math.pow(1-t, 2) * p.startX + 2 * (1-t) * t * p.cpX + Math.pow(t, 2) * p.targetX;
              p.y = Math.pow(1-t, 2) * p.startY + 2 * (1-t) * t * p.cpY + Math.pow(t, 2) * p.targetY;

              ctx.save();
              ctx.globalAlpha = 1 - Math.pow(t, 4); // اختفاء ناعم جداً بالنهاية
              ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 6; ctx.shadowOffsetY = 3;
              ctx.font = "28px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
              ctx.fillText(p.icon, p.x, p.y);
              ctx.restore();
          }
      }
  }

  function loop() {
    ctx.clearRect(0,0,logicalWidth,logicalHeight);
    drawGridPanel();
    
    if (activeBooster) {
        ctx.save();
        ctx.fillStyle = "rgba(231, 76, 60, 0.15)";
        roundRect(gridOriginX, gridOriginY, gridCols*cellSize, gridRows*cellSize, 14);
        ctx.fill();
        ctx.fillStyle = "#ff7675"; ctx.font = "bold 16px 'Segoe UI'"; ctx.textAlign = "center";
        let msg = "💣 انقر على منطقة لتفجيرها";
        ctx.fillText(msg, logicalWidth/2, gridOriginY - 12);
        ctx.restore();
    }

    if (dragPiece) drawDropPreview();
    pieces.forEach(p => { 
        if (!p.placed && p !== dragPiece) drawPiece(p, 1, animating.has(p.id) ? p.animSize : trayCellSize);
    });
    if (dragPiece) drawPiece(dragPiece, 0.95, cellSize);
    updateAndDrawParticles();
    animationFrameId = requestAnimationFrame(loop);
  }

  function isValidPlacement(piece, row, col){
    for (let r=0;r<piece.rows;r++) for (let c=0;c<piece.cols;c++){
        if (piece.shape[r][c] !== 1) continue;
        const absR = row+r, absC = col+c;
        if (absR<0 || absR>=gridRows || absC<0 || absC>=gridCols || occupied[absR][absC] !== null) return false;
    }
    return true;
  }

  function saveState() {
      previousState = {
          occupied: occupied.map(row => row.map(cell => cell ? {...cell} : null)),
          pieces: JSON.parse(JSON.stringify(pieces)),
          score: score, currentLevel: currentLevel
      };
  }

  function placePiece(piece, r, c){
    saveState(); playSound('place');
    for(let i=0;i<piece.rows;i++) for(let j=0;j<piece.cols;j++) if(piece.shape[i][j]===1) occupied[r+i][c+j] = {color: piece.color, templateIndex: piece.templateIndex};
    piece.placed = true;
    checkLines();
    if(pieces.every(p => p.placed)) { pieces = []; generateTrayPieces(); } else { checkGameOver(); }
    updateButtonsState();
  }

  function checkLines() {
      let rowsToClear = [], colsToClear = [];
      for(let r=0; r<gridRows; r++) if(occupied[r].every(c => c !== null)) rowsToClear.push(r);
      for(let c=0; c<gridCols; c++) if(occupied.every(row => row[c] !== null)) colsToClear.push(c);

      const hasCrush = rowsToClear.length > 0 || colsToClear.length > 0;
      if(hasCrush) playSound('crush');

      function clearCell(r, c) {
          const px = gridOriginX+c*cellSize, py = gridOriginY+r*cellSize;
          const cell = occupied[r][c];
          let cellIcon = getIconForTheme(cell.templateIndex);
          
          if (gameMode === 'levels' && cellIcon) {
              spawnFlyingItem(px + cellSize/2, py + cellSize/2, activeTargetIcon);
          } else {
              spawnCoins(px, py);
          }
          score += 10;
          occupied[r][c] = null; 
      }
      rowsToClear.forEach(r => { for(let c=0; c<gridCols; c++) clearCell(r, c); });
      colsToClear.forEach(c => { for(let r=0; r<gridRows; r++) if(occupied[r][c]) clearCell(r, c); });

      if(hasCrush) {
          updateScoreDisplay(); updateButtonsState();
          if (gameMode === 'classic') checkLevelProgress(); 
      }
  }

  function checkLevelProgress() {
      if (gameMode === 'levels' && levelProgress >= levelTarget) {
          playSound('win'); currentLevel++; localStorage.setItem('blockCrushLevel', currentLevel); savedLevelSpan.textContent = currentLevel;
          document.getElementById('modalTitle').textContent = "🎉 مستوى مكتمل!";
          document.getElementById('modalText').textContent = `لقد جمعت الأهداف المطلوبة بنجاح وانتقلت للمستوى ${currentLevel}.`;
          document.getElementById('modalNextBtn').style.display = 'block'; document.getElementById('gameOverModal').classList.remove('hidden');
      }
  }

  function checkGameOver() {
      let canPlaceAny = pieces.filter(p=>!p.placed).some(p => {
          for(let r=0; r<gridRows; r++) for(let c=0; c<gridCols; c++) if(isValidPlacement(p, r, c)) return true; return false;
      });
      if(!canPlaceAny) {
          document.getElementById('modalTitle').textContent = "انتهت اللعبة";
          document.getElementById('modalText').textContent = `لا توجد حركات ممكنة. رصيدك ${score} 🪙`;
          document.getElementById('modalNextBtn').style.display = 'none'; document.getElementById('gameOverModal').classList.remove('hidden');
      }
  }

  function undoMove() {
      if (!previousState || previousState.score < 100) return;
      playSound('undo');
      occupied = previousState.occupied.map(r => r.map(c => c ? {...c} : null)); pieces = JSON.parse(JSON.stringify(previousState.pieces));
      score = previousState.score - 100; currentLevel = previousState.currentLevel; previousState = null; 
      layoutTrayPositions(); updateScoreDisplay(); updateButtonsState();
      document.getElementById('gameOverModal').classList.add('hidden');
  }

  function animatePieceTo(piece, tx, ty, dur){
    const sx = piece.x, sy = piece.y, sSize = cellSize, tSize = trayCellSize, start = performance.now();
    animating.add(piece.id); piece.animSize = sSize;
    function step(now){
      let t = Math.min(1, (now-start)/dur); const e = 1 - Math.pow(1-t, 3);
      piece.x = sx + (tx-sx)*e; piece.y = sy + (ty-sy)*e; piece.animSize = sSize + (tSize-sSize)*e;
      if (t < 1) requestAnimationFrame(step); else { piece.x = tx; piece.y = ty; piece.animSize = tSize; animating.delete(piece.id); }
    }
    requestAnimationFrame(step);
  }

  function getCanvasCoords(evt){
    const rect = canvas.getBoundingClientRect();
    return { x: (evt.clientX - rect.left) * (logicalWidth / rect.width), y: (evt.clientY - rect.top) * (logicalHeight / rect.height) };
  }

  function onPointerDown(evt){
    if (document.querySelectorAll('.overlay:not(.hidden)').length > 0) return;
    const {x,y} = getCanvasCoords(evt);
    
    if (activeBooster) {
        const col = Math.floor((x - gridOriginX) / cellSize);
        const row = Math.floor((y - gridOriginY) / cellSize);
        if (row >= 0 && row < gridRows && col >= 0 && col < gridCols) {
            if (activeBooster === 'bomb') {
                let cleared = false;
                for (let r = Math.max(0, row - 1); r <= Math.min(gridRows - 1, row + 1); r++) {
                    for (let c = Math.max(0, col - 1); c <= Math.min(gridCols - 1, col + 1); c++) {
                        if (occupied[r][c]) {
                            occupied[r][c] = null;
                            spawnCoins(gridOriginX + c * cellSize, gridOriginY + r * cellSize); cleared = true;
                        }
                    }
                }
                if (cleared) { playSound('bomb'); score -= 100; activeBooster = null; }
            }
            updateScoreDisplay(); updateButtonsState(); checkGameOver();
        }
        return; 
    }

    let hit = null, best = Infinity;
    for (let p of pieces) {
        if (p.placed || animating.has(p.id)) continue;
        const w = p.cols * trayCellSize, h = p.rows * trayCellSize;
        if (x >= p.x-30 && x <= p.x+w+30 && y >= p.y-30 && y <= p.y+h+30) {
            const d = Math.hypot(x - (p.x+w/2), y - (p.y+h/2));
            if (d < best) { best = d; hit = p; }
        }
    }
    if (!hit) return;
    
    playSound('drag'); dragPiece = hit;
    dragOffsetX = (hit.cols * cellSize) / 2; dragOffsetY = (hit.rows * cellSize) + 40; 
    dragPiece.x = x - dragOffsetX; dragPiece.y = y - dragOffsetY;
    canvas.setPointerCapture(evt.pointerId);
  }

  function onPointerMove(evt){
    if (!dragPiece) return;
    const {x,y} = getCanvasCoords(evt);
    dragPiece.x = x - dragOffsetX; dragPiece.y = y - dragOffsetY;
  }

  function onPointerUp(){
    if (!dragPiece) return;
    const p = dragPiece; dragPiece = null;
    const tCol = Math.round((p.x - gridOriginX)/cellSize), tRow = Math.round((p.y - gridOriginY)/cellSize);
    if (isValidPlacement(p, tRow, tCol)) placePiece(p, tRow, tCol); else animatePieceTo(p, p.trayX, p.trayY, 200);
  }

  canvas.addEventListener('pointerdown', onPointerDown); canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerup', onPointerUp); canvas.addEventListener('pointercancel', onPointerUp);

  document.getElementById('btnModeLevels').addEventListener('click', () => initGame('levels'));
  document.getElementById('btnModeClassic').addEventListener('click', () => initGame('classic'));
  document.getElementById('undoBtn').addEventListener('click', undoMove);
  topMenuBtn.addEventListener('click', () => document.getElementById('mainMenu').classList.remove('hidden'));
  document.getElementById('btnSettings').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('hidden'));
  document.getElementById('closeSettingsBtn').addEventListener('click', () => document.getElementById('settingsModal').classList.add('hidden'));
  
  topBuyBtn.addEventListener('click', () => { if (score >= 150) document.getElementById('storeModal').classList.remove('hidden'); });
  document.getElementById('closeStoreBtn').addEventListener('click', () => document.getElementById('storeModal').classList.add('hidden'));
  
  document.getElementById('modalReplayBtn').addEventListener('click', () => initGame(gameMode));
  document.getElementById('modalNextBtn').addEventListener('click', () => initGame('levels'));
  document.getElementById('modalMenuBtn').addEventListener('click', () => { document.getElementById('gameOverModal').classList.add('hidden'); document.getElementById('mainMenu').classList.remove('hidden'); });

})();
</script>
</body>
</html>
